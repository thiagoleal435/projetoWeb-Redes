<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulação visual do modelo OSI com requisições de rede — HTTP, SMTP, FTP, WebSocket">
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/header.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/form.css">
    <link rel="stylesheet" href="./assets/css/osi-layers.css">
    <link href="https://fonts.googleapis.com/css2?family=Stardos+Stencil:wght@400;700&display=swap" rel="stylesheet">
    <title>Redes de Computadores - Modelo OSI</title>
</head>
<body>
    <header class="header">
        <img src="./assets/img/osi.png" alt="Logo do Modelo OSI">
        <p class="header-title">Projeto de redes - Modelo OSI</p>
        <p class="header-user">usuário : thiago.leal</p>
    </header>
    <main class="main">
        <div class="main-campos">
            <input type="text" placeholder="Digite sua mensagem aqui..." class="main-input">
            <button class="main-button">Realizar Requisição</button>
            <input type="file" class="main-file-input">
        </div>
        <p class="main-result-protocol">HTTP</p>
    </main>
    <section class="section">
        <form method="post" class="section-form">
        </form>
    </section>

    <!-- Container das camadas OSI (renderizado via JS) -->
    <div id="osi-layers-container" class="osi-container"></div>

    <script type="module" src="./scripts/script.js"></script>
</body>
</html>
